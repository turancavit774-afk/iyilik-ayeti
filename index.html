<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyiliğin Geleceği Kulübü</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* Genel stil ve pastel/ toprak renkleri */
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: #f3ece0;
    color: #3e3a36;
  }

  header {
    background: #c8b8a3;
    padding: 20px;
    text-align: center;
    color: #fff;
    font-size: 1.5rem;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  nav {
    display: flex;
    justify-content: center;
    background: #d6c4b5;
    flex-wrap: wrap;
  }

  nav button {
    background: #f3e7d2;
    border: none;
    margin: 5px;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }

  nav button:hover {
    background: #c8b8a3;
    color: #fff;
  }

  main {
    max-width: 700px;
    margin: 20px auto;
    padding: 0 15px;
  }

  .ayat-box {
    background: #fff7ed;
    border-left: 5px solid #c8b8a3;
    padding: 20px;
    border-radius: 10px;
    font-size: 1.1rem;
    line-height: 1.6;
    min-height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: 0.3s;
  }

  .ayat-box.fade {
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .placeholder {
    font-style: italic;
    color: #7a7065;
  }

  .footer {
    text-align: center;
    margin: 40px 0 20px;
    font-size: 0.9rem;
    color: #555;
  }

  .whatsapp-link {
    display: inline-block;
    background: #25d366;
    color: #fff;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
    margin-top: 15px;
    transition: 0.3s;
  }

  .whatsapp-link:hover {
    background: #1ebe57;
  }

  @media(max-width: 500px) {
    nav button {
      flex: 1 1 45%;
      margin: 5px 5px;
    }

    .ayat-box {
      font-size: 1rem;
    }
  }
</style>
</head>
<body>
<header>İyiliğin Geleceği Kulübü</header>
<nav>
  <button onclick="showCategory('ayeti')">Günün Ayeti</button>
  <button onclick="showCategory('hadis')">Günün Hadisi</button>
  <button onclick="showCategory('camiisi')">Camiisi</button>
  <button onclick="showCategory('sahabesi')">Sahabesi</button>
  <button onclick="showCategory('ihh')">İHH Genç</button>
</nav>
<main>
  <div class="ayat-box" id="content">Yükleniyor...</div>
  <div style="text-align:center;">
    <a href="https://chat.whatsapp.com/CTnxGJEI3pV4Xz1tjzkehQ?mode=gi_t" target="_blank" class="whatsapp-link">WhatsApp Grubuna Katıl</a>
  </div>
</main>
<div class="footer">© İyiliğin Geleceği Kulübü | İHH Genç</div>

<script>
const apiUrl = 'https://api.npoint.io/1cd52bb7c3d023ff1d5c';

let ayetData = [];

async function fetchAyets() {
  try {
    const response = await fetch(apiUrl);
    const data = await response.json();
    ayetData = data;
    showRandomAyet();
  } catch (error) {
    document.getElementById('content').innerText = 'Ayetler yüklenemedi.';
    console.error(error);
  }
}

function showRandomAyet() {
  if (!ayetData.length) return;
  const index = Math.floor(Math.random() * ayetData.length);
  const box = document.getElementById('content');
  box.classList.add('fade');
  setTimeout(() => {
    box.innerHTML = ayetData[index].text || 'Ayet bulunamadı.';
    box.classList.remove('fade');
  }, 500);
}

function showCategory(category) {
  const box = document.getElementById('content');
  box.classList.add('fade');
  setTimeout(() => {
    if (category === 'ayeti') {
      showRandomAyet();
    } else {
      box.innerHTML = '<span class="placeholder">Bu kategori için içerik bulunamadı.</span>';
    }
    box.classList.remove('fade');
  }, 500);
}

window.onload = fetchAyets;
</script>
</body>
</html>
