<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÇÜ İyiliğin Geleceği Kulübü - Ayetler</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    /* Genel ayarlar */
    * {margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif;}
    body {
      background: linear-gradient(to bottom, #f0f4f8, #cce0ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
      text-align: center;
    }

    /* Başlık */
    header {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
    }

    /* Ayet kutusu */
    #ayet-box {
      background: #ffffffcc;
      padding: 25px 20px;
      border-radius: 15px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      transition: all 0.5s ease;
      margin-bottom: 20px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #ayet-box p {
      font-size: 1.1rem;
      color: #222;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    #ayet-box span {
      font-size: 0.95rem;
      color: #555;
      font-style: italic;
    }

    /* Yeni Ayet butonu */
    #new-ayet {
      background: #4a90e2;
      color: #fff;
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    #new-ayet:hover {
      background: #357ABD;
      transform: translateY(-3px);
    }

    /* QR ve paylaşım alanı */
    #share-area {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 15px;
    }

    #qr-code img {
      width: 120px;
      height: 120px;
    }

    #whatsapp a {
      text-decoration: none;
      background: #25D366;
      color: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    #whatsapp a:hover {
      background: #1ebe5d;
    }

    /* Footer */
    footer {
      font-size: 0.85rem;
      color: #333;
      margin-top: 15px;
    }

    /* Logo */
    #logo {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 0.8rem;
      color: #555;
    }

    @media(max-width: 600px){
      #ayet-box p {font-size: 1rem;}
      #new-ayet {width: 80%;}
    }
  </style>
</head>
<body>

  <header>ÇÜ İyiliğin Geleceği Kulübü</header>

  <div id="ayet-box">
    <p id="ayet">Yükleniyor...</p>
    <span id="sure">...</span>
  </div>

  <button id="new-ayet">Yeni Ayet</button>

  <div id="share-area">
    <div id="qr-code">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://iyiligin-gelecegi.github.io/iyilik-ayeti/ayet.html" alt="QR Kod">
    </div>
    <div id="whatsapp">
      <a href="https://chat.whatsapp.com/YourGroupLinkHere" target="_blank">WhatsApp Grubumuz</a>
    </div>
  </div>

  <footer>© 2026 ÇÜ İyiliğin Geleceği Kulübü | İHH Genç</footer>
  <div id="logo">İHH Genç</div>

  <script>
    // Ayetleri JSON dosyandan veya nPoint linkinden çekebilirsin
    const ayetler = [
      {"ayet":"Siz insanlara iyilik yapmayı emredip kendinizi unutuyor musunuz? Halbuki ilâhî kitabı da okuyup duruyorsunuz. Hiç aklınızı çalıştırmıyor musunuz?","sure":"Bakara / 44"},
      {"ayet":"Bir zamanlar size: 'Şu şehre girin de oradaki nimetlerden istediğiniz gibi bol bol yeyin; şehrin kapısından eğilerek girin ve «Hıtta: bizi affet!» deyin ki hatalarınızı bağışlayalım. Biz, iyilik yapanların mükâfatını fazlasıyla vereceğiz' demiştik.","sure":"Bakara / 58"},
      {"ayet":"Hani biz, İsrâiloğulları’ndan: 'Sadece Allah’a kulluk edeceksiniz, ana-babaya, akrabaya, yetimlere, yoksullara iyilikte bulunacaksınız!' diye söz almış ve: 'İnsanlara güzel söz söyleyin, namazı hakkıyla kılın, zekâtı verin!' diye emretmiştik.","sure":"Bakara / 83"}
      // Diğer ayetleri buraya ekle veya JSON linkinden çek
    ];

    const ayetText = document.getElementById("ayet");
    const ayetSure = document.getElementById("sure");
    const newButton = document.getElementById("new-ayet");

    function rastgeleAyet(){
      const random = Math.floor(Math.random() * ayetler.length);
      const ayet = ayetler[random];
      // fade efekti
      ayetText.style.opacity = 0;
      ayetSure.style.opacity = 0;
      setTimeout(()=>{
        ayetText.innerText = ayet.ayet;
        ayetSure.innerText = ayet.sure;
        ayetText.style.opacity = 1;
        ayetSure.style.opacity = 1;
      }, 300);
    }

    newButton.addEventListener("click", rastgeleAyet);

    // Sayfa yüklenince rastgele ayet
    window.onload = rastgeleAyet;
  </script>
</body>
</html>
