<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlim Köşesi | Adana</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11;
            --card-bg: #15191d;
            --primary: #1b4332; /* Koyu İslami Yeşil */
            --accent: #2d6a4f;
            --text-main: #e9ecef;
            --text-dim: #adb5bd;
            --whatsapp: #25d366;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; padding: 15px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .card { 
            background: var(--card-bg); 
            width: 100%; max-width: 420px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Kulüp Logosu Alanı */
        .logo-area { text-align: center; padding: 20px 0 10px; }
        .logo-area img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; background: white; }

       /* Adana Ezan Vakitleri */
.vakit-bar { 
    background: rgba(0,0,0,0.2); 
    display: grid; 
    grid-template-columns: repeat(5, 1fr); 
    text-align: center; 
    font-size: 0.65rem; 
    padding: 12px; 
    margin: 10px 15px; 
    border-radius: 15px;
}

.vakit-item b { 
    display: block; 
    color: var(--whatsapp); 
    font-size: 0.85rem; 
    margin-top: 2px; 
}

/* Saat ve Geri Sayım Alanı */
.saat-alani {
    text-align: center;
    margin: 20px 15px 5px 15px;
    background: rgba(0,0,0,0.2); 
    padding: 15px;
    border-radius: 15px;
}

#canli-saat {
    font-size: 2.5rem;
    font-weight: bold;
    color: white;
    display: block;
}

#kalan-sure {
    font-size: 0.9rem;
    color: var(--whatsapp);
    font-weight: bold;
    margin-top: 5px;
}
        /* İçerik Alanı */
        .content { padding: 20px 30px; text-align: center; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        #kat-etiket { color: var(--whatsapp); font-weight: 600; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
        #ana-metin { font-family: 'Amiri', serif; font-size: 1.6rem; line-height: 1.6; margin: 0 0 15px 0; color: #fff; }
        #kaynak { font-size: 0.85rem; color: var(--text-dim); font-style: italic; }

        /* Butonlar */
        .actions { display: flex; flex-direction: column; gap: 12px; align-items: center; padding-bottom: 25px; }
        .btn { border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; width: 70%; }
        .refresh-btn { background: var(--primary); color: white; padding: 12px 0; }
        .refresh-btn:active { transform: scale(0.95); }
        .share-btn { background: transparent; border: 1px solid var(--accent); color: var(--text-main); padding: 8px 0; font-size: 0.8rem; }
        
        .wp-link { text-decoration: none; color: var(--whatsapp); font-size: 0.85rem; margin-top: 5px; font-weight: 600; border-bottom: 1px dashed var(--whatsapp); padding-bottom: 2px; }

        /* Alt Menü */
        .nav-tabs { display: grid; grid-template-columns: repeat(4, 1fr); background: #1c2126; }
        .nav-btn { padding: 18px 0; border: none; background: none; color: var(--text-dim); cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.2s; }
        .nav-btn.active { color: white; background: var(--primary); box-shadow: inset 0 4px 0 var(--whatsapp); }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-area">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" alt="Kulüp Logo">
    </div>

    <div class="vakit-bar">
        <div class="vakit-item">İmsak<b id="v-imsak">--:--</b></div>
        <div class="vakit-item">Öğle<b id="v-ogle">--:--</b></div>
        <div class="vakit-item">İkindi<b id="v-ikindi">--:--</b></div>
        <div class="vakit-item">Akşam<b id="v-aksam">--:--</b></div>
        <div class="vakit-item">Yatsı<b id="v-yatsi">--:--</b></div>
    </div>

    <div class="content">
        <div id="kat-etiket">Günün Ayeti</div>
        <p id="ana-metin">Yükleniyor...</p>
        <div id="kaynak"></div>
    </div>

    <div class="actions">
        <button class="btn refresh-btn" onclick="rastgeleGetir()">🔄 Değiştir</button>
        <button class="btn share-btn" onclick="paylas()">📤 Paylaş</button>
        <a href="https://chat.whatsapp.com/CTnxGJEI3pV4Xz1tjzkehQ" target="_blank" class="wp-link">💬 Kulüp Grubu'na Katıl</a>
    </div>

    <div class="nav-tabs">
        <button class="nav-btn active" onclick="tabDegistir('ayetler', this)">AYET</button>
        <button class="nav-btn" onclick="tabDegistir('hadisler', this)">HADİS</button>
        <button class="nav-btn" onclick="tabDegistir('sahabeler', this)">SAHABE</button>
        <button class="nav-btn" onclick="tabDegistir('dualar', this)">DUA</button>
    </div>
</div>

<script>
    let veriler = {};
    let aktifKategori = 'ayetler';

    // Adana Ezan Vakitleri
    async function vakitCek() {
        try {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Adana&country=Turkey&method=13');
            const data = await res.json();
            const t = data.data.timings;
            document.getElementById('v-imsak').innerText = t.Fajr;
            document.getElementById('v-ogle').innerText = t.Dhuhr;
            document.getElementById('v-ikindi').innerText = t.Asr;
            document.getElementById('v-aksam').innerText = t.Maghrib;
            document.getElementById('v-yatsi').innerText = t.Isha;
        } catch (e) { console.log("Hata"); }
    }

// npoint Veri Çekme
async function verileriGetir() {
    try {
        // URL'yi tırnak içine aldık ("...")
        const res = await fetch("https://api.npoint.io/94a7d4f2e4d98725a67c");
        
        // Verinin gelip gelmediğini kontrol edelim
        if (!res.ok) throw new Error("Veri çekilemedi");

        veriler = await res.json();
        rastgeleGetir();
    } catch (e) { 
        console.error("Hata:", e); // Hatayı konsolda görmek için
        document.getElementById('ana-metin').innerText = "Veri yüklenirken bir hata oluştu. Lütfen npoint bağlantısını kontrol edin."; 
    }
}
    function tabDegistir(kat, el) {
        aktifKategori = kat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('kat-etiket').innerText = "Günün " + kat.slice(0,-3);
        rastgeleGetir();
    }

    function rastgeleGetir() {
        const liste = veriler[aktifKategori];
        if(!liste) return;
        const secilen = liste[Math.floor(Math.random() * liste.length)];
        document.getElementById('ana-metin').innerText = secilen.metin || secilen.bilgi;
        document.getElementById('kaynak').innerText = secilen.kaynak || secilen.isim || "";
    }

    function paylas() {
        const metin = document.getElementById('ana-metin').innerText;
        const kaynak = document.getElementById('kaynak').innerText;
        const url = window.location.href;
        const shareText = `"${metin}"\n\nKaynak: ${kaynak}\n\nİlim Köşesi'nden daha fazlası için: ${url}`;

        if (navigator.share) {
            navigator.share({ title: 'Günün Bilgisi', text: shareText });
        } else {
            const tempInput = document.createElement("textarea");
            tempInput.value = shareText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            alert("Metin kopyalandı! İstediğiniz yerde paylaşabilirsiniz.");
        }
    }

    vakitCek();
    verileriGetir();
</script>

</body>
</html>
